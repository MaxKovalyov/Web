		<h1>Связь со мной</h1>

		<h3>Заполните форму</h3>
		<form class="form" method="post" action="mailto:maksimkov2000@mail.ru" name="form_cont" id="forma">
				<div class="label">
					<label>ФИО  <input type="text" name="fio" id="fio" maxlength="30" size="30"></label>
					<p id="demo1"></p>
				</div>
				<div class="label">
					<label>Пол
						<input type="radio" name="sex" id="sex" value="Мужской"> Мужской
						<input type="radio" name="sex" id="sex" value="Женский"> Женский
					</label>
				</div>
				<div class="label">
					<label for="age">Возраст</label>
					<select name="age" size="1" id="age">
						<option value="0" selected>Неопределён</option>
						<option value="менее 16">Менее 16</option>
						<option value="от 16 до 21">От 16 до 21</option>
						<option value="от 22 до 35">От 22 до 35</option>
						<option value="От 36 до 50">От 36 до 50</option>
						<option value="Старше 50">Старше 50</option>
					</select>
					<p id="demo2"></p>
				</div>
				<div class="label">
					<label>Дата рождения <input type="text" value="дд.месяц.гггг" id="data-r" readonly></label>
					<div name="calendar" class="calendar" id="icalendar">
						<div class="monayear">
							<select id="month" onchange="changeMonth()">
								<option value="1">January</option>
								<option value="2">February</option>
								<option value="3">March</option>
								<option value="4">April</option>
								<option value="5">May</option>
								<option value="6">June</option>
								<option value="7">July</option>
								<option value="8">August</option>
								<option value="9">September</option>
								<option value="10">October</option>
								<option value="11">November</option>
								<option value="12">December</option>
							</select>
							<select id="year" onchange="changeYear()">
								<option value="2000">2000</option>
								<option value="2001">2001</option>
								<option value="2002">2002</option>
								<option value="2003">2003</option>
								<option value="2004">2004</option>
								<option value="2005">2005</option>
								<option value="2006">2006</option>
								<option value="2007">2007</option>
								<option value="2008">2008</option>
								<option value="2009">2009</option>
								<option value="2010">2010</option>
								<option value="2011">2011</option>
								<option value="2012">2012</option>
								<option value="2013">2013</option>
								<option value="2014">2014</option>
								<option value="2015">2015</option>
							</select>
						</div>
						<div class="day-name">
							<div class="dn">Su</div>
							<div class="dn">Mo</div>
							<div class="dn">Tu</div>
							<div class="dn">We</div>
							<div class="dn">Th</div>
							<div class="dn">Fr</div>
							<div class="dn">Sa</div>
						</div>
						<div class="day" id="days"></div>
					</div>
					<p id="demo5"></p>
				</div>
				<div class="label">
					<label>E-Mail <input type="email" size="30" id="email" name="email" placeholder="Введите ваш e-mail"></label>
					<p id="demo3"></p>
				</div>
				<div class="label">
					<label>Телефон <input type="text" id="telef" name="telef" placeholder="Введите номер телефона" onsubmit="return validNumber();"></label>

				</div>
